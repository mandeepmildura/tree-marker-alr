<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tree Marker — Live Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0f172a;
  --surface: #1e293b;
  --border:  #334155;
  --blue:    #38bdf8;
  --green:   #4ade80;
  --yellow:  #facc15;
  --red:     #f87171;
  --text:    #f1f5f9;
  --muted:   #64748b;
  --dim:     #94a3b8;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg); color: var(--text);
  display: flex; height: 100vh; overflow: hidden;
}

/* ══════════════ SIDEBAR ══════════════ */
#sidebar {
  width: 280px; min-width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* Brand */
#brand {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
#brand-icon {
  width: 36px; height: 36px; border-radius: 8px;
  background: linear-gradient(135deg, #166534, #15803d);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
#brand-text { flex: 1; min-width: 0; }
#brand-text h1 { font-size: 14px; font-weight: 700; color: var(--text); }
#brand-text p  { font-size: 11px; color: var(--muted); margin-top: 1px; }
#live-badge {
  display: flex; align-items: center; gap: 5px;
  background: #052e16; border: 1px solid #166534;
  border-radius: 20px; padding: 3px 8px;
  font-size: 10px; font-weight: 600; color: var(--green);
  transition: all .4s;
}
#live-badge.offline { background: #1c0a0a; border-color: #7f1d1d; color: var(--red); }
#live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
  animation: pulse-green 2s infinite;
}
#live-badge.offline #live-dot { background: var(--red); animation: none; }
@keyframes pulse-green {
  0%,100% { box-shadow: 0 0 0 0 rgba(74,222,128,.7); }
  50%      { box-shadow: 0 0 0 5px rgba(74,222,128,0); }
}

/* Section headers */
.section-hdr {
  font-size: 9px; font-weight: 700; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--muted);
  padding: 14px 16px 6px;
}

/* Stats grid */
#stats-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; padding: 0 12px 12px;
}
.stat-card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
}
.stat-card .val {
  font-size: 28px; font-weight: 800; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.stat-card .val.green { color: var(--green); }
.stat-card .val.blue  { color: var(--blue);  }
.stat-card .lbl {
  font-size: 10px; color: var(--muted);
  text-transform: uppercase; letter-spacing: .5px; margin-top: 3px;
}

/* Progress */
#progress-wrap { padding: 0 12px 14px; }
#progress-bar-track {
  background: var(--bg); border-radius: 99px;
  height: 8px; overflow: hidden; margin-bottom: 5px;
  border: 1px solid var(--border);
}
#progress-bar-fill {
  height: 100%; border-radius: 99px; width: 0%;
  background: linear-gradient(90deg, #166534, var(--green));
  transition: width .6s ease;
}
#progress-label { font-size: 11px; color: var(--dim); display: flex; justify-content: space-between; }
#progress-pct { font-weight: 700; color: var(--green); }

/* Last hit card */
#last-hit-card {
  margin: 0 12px 12px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px;
}
#last-hit-card .lh-title {
  font-size: 18px; font-weight: 800; color: var(--text);
  letter-spacing: -.3px;
}
#last-hit-card .lh-dist {
  font-size: 12px; color: var(--green); margin: 3px 0;
  font-weight: 600;
}
#last-hit-card .lh-time {
  font-size: 11px; color: var(--muted);
}
#last-hit-card .lh-coords {
  font-size: 10px; color: var(--muted);
  font-family: "Courier New", monospace; margin-top: 4px;
}
#last-hit-empty { font-size: 12px; color: var(--muted); font-style: italic; }

/* Simulate button */
#sim-btn {
  margin: 0 12px 12px;
  padding: 9px 0; width: calc(100% - 24px);
  background: #1e3a5f; border: 1px solid #2563eb;
  color: #93c5fd; font-size: 12px; font-weight: 700;
  border-radius: 8px; cursor: pointer; letter-spacing: .5px;
  transition: background .2s;
}
#sim-btn:hover { background: #1d4ed8; color: #fff; }
#sim-btn.running { background: #7f1d1d; border-color: #dc2626; color: #fca5a5; }

/* Activity log */
#log-wrap {
  flex: 1; overflow: hidden; display: flex; flex-direction: column;
  border-top: 1px solid var(--border);
}
#log-scroll { flex: 1; overflow-y: auto; padding: 0 12px 8px; }
#log-scroll::-webkit-scrollbar { width: 4px; }
#log-scroll::-webkit-scrollbar-track { background: transparent; }
#log-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
#log-list { list-style: none; }
#log-list li {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 0; border-bottom: 1px solid #1e293b;
  font-size: 11px;
}
#log-list li:last-child { border-bottom: none; }
.log-badge {
  background: #052e16; border: 1px solid #166534;
  color: var(--green); font-size: 10px; font-weight: 700;
  padding: 2px 6px; border-radius: 4px; white-space: nowrap;
  font-family: "Courier New", monospace;
}
.log-info { flex: 1; min-width: 0; }
.log-info .log-time { color: var(--dim); }
.log-info .log-dist { color: var(--muted); }
.log-empty { font-size: 11px; color: var(--muted); font-style: italic; padding: 8px 0; }

/* ══════════════ MAP AREA ══════════════ */
#map-wrap { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

/* Floating HUD — top right */
#hud {
  position: absolute; top: 12px; right: 56px; z-index: 1000;
  background: rgba(15,23,42,.85); backdrop-filter: blur(6px);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 12px; display: flex; align-items: center; gap: 10px;
  font-size: 11px;
}
.hud-chip {
  display: flex; align-items: center; gap: 4px;
  color: var(--dim);
}
.hud-chip .dot {
  width: 7px; height: 7px; border-radius: 50%;
}
.hud-chip .dot.green { background: var(--green); }
.hud-chip .dot.blue  { background: var(--blue);  }
.hud-chip .dot.red   { background: var(--red);   }
.hud-sep { width: 1px; height: 14px; background: var(--border); }

/* Leaflet controls look */
.leaflet-control-zoom a {
  background: rgba(15,23,42,.9) !important;
  color: var(--text) !important;
  border-color: var(--border) !important;
}
.leaflet-control-zoom a:hover {
  background: var(--surface) !important;
}
.leaflet-control-layers-toggle {
  background-color: rgba(15,23,42,.9) !important;
}
</style>
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<div id="sidebar">

  <!-- Brand -->
  <div id="brand">
    <div id="brand-icon">🌳</div>
    <div id="brand-text">
      <h1>Tree Marker</h1>
      <p>Sunraysia Acres</p>
    </div>
    <div id="live-badge" class="offline">
      <div id="live-dot"></div>
      <span id="live-label">Offline</span>
    </div>
  </div>

  <!-- Session Stats -->
  <div class="section-hdr">Session Stats</div>
  <div id="stats-grid">
    <div class="stat-card">
      <div class="val green" id="s-hits">0</div>
      <div class="lbl">Marked</div>
    </div>
    <div class="stat-card">
      <div class="val blue" id="s-planned">—</div>
      <div class="lbl">Planned</div>
    </div>
    <div class="stat-card" style="grid-column:1/-1; padding-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
        <span style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">Progress</span>
        <span class="val green" id="s-pct" style="font-size:20px;">0%</span>
      </div>
      <div id="progress-bar-track">
        <div id="progress-bar-fill"></div>
      </div>
    </div>
  </div>

  <!-- Last Hit -->
  <div class="section-hdr">Last Hit</div>
  <div id="last-hit-card">
    <div id="last-hit-empty">No hits yet this session</div>
    <div id="last-hit-content" style="display:none;">
      <div class="lh-title" id="lh-pos">—</div>
      <div class="lh-dist" id="lh-dist">—</div>
      <div class="lh-time" id="lh-time">—</div>
      <div class="lh-coords" id="lh-coords">—</div>
    </div>
  </div>

  <!-- Simulate -->
  <button id="sim-btn" onclick="toggleSim()">▶ Simulate Run</button>

  <!-- Activity Log -->
  <div id="log-wrap">
    <div class="section-hdr" style="border-top:none;">Activity Log</div>
    <div id="log-scroll">
      <ul id="log-list">
        <li><span class="log-empty">Waiting for GPS hits…</span></li>
      </ul>
    </div>
  </div>

</div>

<!-- ══ MAP ══ -->
<div id="map-wrap">
  <div id="map"></div>

  <!-- Floating HUD -->
  <div id="hud">
    <div class="hud-chip">
      <div class="dot" id="fix-dot" style="background:var(--red)"></div>
      <span id="fix-label">No Fix</span>
    </div>
    <div class="hud-sep"></div>
    <div class="hud-chip">
      <div class="dot blue"></div>
      <span>RTK · ~2 cm</span>
    </div>
    <div class="hud-sep"></div>
    <div class="hud-chip" id="fw-chip">
      <span id="fw-label" style="color:var(--muted)">fw —</span>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  GRID CONFIG — must match tree_marker.ino exactly
// ═══════════════════════════════════════════════════════
const CFG = {
  originLat:   -34.3166591,
  originLon:    142.1562539,
  rowBearing:   180.0,
  rowSpacing:     6.7,
  treeSpacing:    3.0,
  numRows:       10,
  numTrees:      50,
};

const MQTT = {
  host:   "eb65c13ec8ab480a9c8492778fdddda8.s1.eu.hivemq.cloud",
  port:   8884,
  user:   "mandeep",
  pass:   "Gill@1977",
  topic:  "treemarker/hit",
  status: "treemarker/status",
};

// ═══════════════════════════════════════════════════════
//  GRID MATHS
// ═══════════════════════════════════════════════════════
const M_PER_DEG_LAT = 111320.0;
const mPerDegLon    = 111320.0 * Math.cos(CFG.originLat * Math.PI / 180.0);
const bearingRad     = CFG.rowBearing * Math.PI / 180.0;
const perpBearingRad = bearingRad + Math.PI / 2.0;

function treePos(r, t) {
  const along  = t * CFG.treeSpacing;
  const across = r * CFG.rowSpacing;
  const lat = CFG.originLat +
    (along * Math.cos(bearingRad) + across * Math.cos(perpBearingRad)) / M_PER_DEG_LAT;
  const lon = CFG.originLon +
    (along * Math.sin(bearingRad) + across * Math.sin(perpBearingRad)) / mPerDegLon;
  return [lat, lon];
}

const grid = [];
for (let r = 0; r < CFG.numRows; r++) {
  grid[r] = [];
  for (let t = 0; t < CFG.numTrees; t++) grid[r][t] = treePos(r, t);
}
const total = CFG.numRows * CFG.numTrees;
document.getElementById("s-planned").textContent = total;

// ═══════════════════════════════════════════════════════
//  MAP
// ═══════════════════════════════════════════════════════
const map = L.map("map", { maxZoom: 20, zoomControl: true });

const satLayer = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  { attribution: "© Esri", maxNativeZoom: 19, maxZoom: 20 }
).addTo(map);

const darkLayer = L.tileLayer(
  "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
  { attribution: "© CartoDB", maxNativeZoom: 19, maxZoom: 20 }
);

L.control.layers(
  { "Satellite": satLayer, "Dark": darkLayer },
  {}, { position: "topright" }
).addTo(map);

// Draw planned tree dots
const plannedLayer = L.layerGroup().addTo(map);
for (let r = 0; r < CFG.numRows; r++) {
  for (let t = 0; t < CFG.numTrees; t++) {
    L.circleMarker(grid[r][t], {
      radius: 5, color: "#92400e", weight: 1,
      fillColor: "#facc15", fillOpacity: 0.85,
    })
    .bindTooltip(`Row ${r}  Tree ${t}`, { direction: "top", offset: [0, -6] })
    .addTo(plannedLayer);
  }
}

// Row lines
for (let r = 0; r < CFG.numRows; r++) {
  L.polyline(grid[r], { color: "#facc15", weight: 1, opacity: 0.35 }).addTo(map);
}

// Origin marker
L.marker([CFG.originLat, CFG.originLon])
  .bindPopup(`<b>Origin — Row 0, Tree 0</b><br>${CFG.originLat.toFixed(7)}, ${CFG.originLon.toFixed(7)}<br>Bearing: ${CFG.rowBearing}°`)
  .addTo(map);

// Fit to grid — deferred so the SVG renderer is fully initialized first
const allPts = [];
for (let r = 0; r < CFG.numRows; r++)
  for (let t = 0; t < CFG.numTrees; t++) allPts.push(grid[r][t]);
const gridBounds = L.latLngBounds(allPts).pad(0.1);
try { map.fitBounds(gridBounds); } catch(e) {} // may throw before renderer init
setTimeout(function() { map.fitBounds(gridBounds); }, 200); // retry once renderer is ready
// ═══════════════════════════════════════════════════════
//  HIT HANDLING
// ═══════════════════════════════════════════════════════
var hitCount = 0;
var hitSet  = new Set();
var hitLayer = L.layerGroup().addTo(map);
var firstLog = true;

function addHit(data) {
  const { row, tree, dist, lat, lon } = data;
  const key = `${row},${tree}`;
  if (hitSet.has(key)) return;
  hitSet.add(key);
  hitCount++;

  // Update stats
  document.getElementById("s-hits").textContent = hitCount;
  const pct = (hitCount / total * 100).toFixed(1);
  document.getElementById("s-pct").textContent = pct + "%";
  document.getElementById("progress-bar-fill").style.width = pct + "%";

  // Last hit card
  document.getElementById("last-hit-empty").style.display = "none";
  document.getElementById("last-hit-content").style.display = "block";
  document.getElementById("lh-pos").textContent  = `Row ${row} / Tree ${tree}`;
  document.getElementById("lh-dist").textContent = `${dist.toFixed(2)} m from centre`;
  document.getElementById("lh-time").textContent = new Date().toLocaleTimeString();
  document.getElementById("lh-coords").textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;

  // Log entry
  if (firstLog) {
    document.getElementById("log-list").innerHTML = "";
    firstLog = false;
  }
  const li = document.createElement("li");
  li.innerHTML =
    `<span class="log-badge">R${row} T${tree}</span>` +
    `<span class="log-info">` +
      `<span class="log-time">${new Date().toLocaleTimeString()}</span>` +
      `<span class="log-dist"> · ${dist.toFixed(2)} m</span>` +
    `</span>`;
  document.getElementById("log-list").prepend(li);

  // Green marker on map (non-critical — renderer may not be ready)
  try {
    L.circleMarker([lat, lon], {
      radius: 7, color: "#166534", weight: 2,
      fillColor: "#4ade80", fillOpacity: 0.95,
    })
    .bindPopup(
      `<b>HIT — Row ${row}, Tree ${tree}</b><br>` +
      `${dist.toFixed(2)} m from centre<br>` +
      `${lat.toFixed(7)}, ${lon.toFixed(7)}<br>` +
      `<small>${new Date().toLocaleTimeString()}</small>`
    )
    .addTo(hitLayer);
  } catch(e) { /* renderer not ready yet — marker skipped, stats still updated */ }
}

// ═══════════════════════════════════════════════════════
//  MQTT
// ═══════════════════════════════════════════════════════
function setBadge(online, label) {
  const badge = document.getElementById("live-badge");
  document.getElementById("live-label").textContent = label;
  badge.className = online ? "" : "offline";
}

const clientId = "dash-" + Math.random().toString(36).substr(2, 6);
const client   = new Paho.MQTT.Client(MQTT.host, MQTT.port, "/mqtt", clientId);

client.onConnectionLost = () => {
  setBadge(false, "Offline");
  setTimeout(connect, 3000);
};

client.onMessageArrived = (msg) => {
  try {
    const data = JSON.parse(msg.payloadString);
    if (msg.destinationName === MQTT.topic) {
      if (data.row !== undefined) addHit(data);
    }
    if (msg.destinationName === MQTT.status) {
      if (data.fw) document.getElementById("fw-label").textContent = "fw " + data.fw;
      const hasFix = data.fix === true;
      document.getElementById("fix-dot").style.background = hasFix ? "var(--green)" : "var(--red)";
      document.getElementById("fix-label").textContent = hasFix ? "GPS Fix ✓" : "No Fix";
    }
  } catch(e) {}
};

function connect() {
  setBadge(false, "Connecting…");
  client.connect({
    useSSL: true,
    userName: MQTT.user,
    password: MQTT.pass,
    keepAliveInterval: 30,
    cleanSession: true,
    onSuccess: () => {
      setBadge(true, "Live");
      client.subscribe(MQTT.topic);
      client.subscribe(MQTT.status);
    },
    onFailure: () => {
      setBadge(false, "Offline");
      setTimeout(connect, 5000);
    },
  });
}

connect();

// ═══════════════════════════════════════════════════════
//  SIMULATOR — injects fake hits without hardware
// ═══════════════════════════════════════════════════════
var simTimer = null;
var simRow = 0, simTree = 0;

function toggleSim() {
  if (simTimer) {
    clearInterval(simTimer);
    simTimer = null;
    document.getElementById("sim-btn").textContent = "▶ Simulate Run";
    document.getElementById("sim-btn").classList.remove("running");
    return;
  }
  // Reset state
  hitCount = 0; hitSet.clear(); hitLayer.clearLayers();
  firstLog = true;
  document.getElementById("s-hits").textContent = "0";
  document.getElementById("s-pct").textContent = "0%";
  document.getElementById("progress-bar-fill").style.width = "0%";
  document.getElementById("last-hit-empty").style.display = "";
  document.getElementById("last-hit-content").style.display = "none";
  document.getElementById("log-list").innerHTML =
    '<li><span class="log-empty">Waiting for GPS hits…</span></li>';
  simRow = 0; simTree = 0;

  // Show GPS fix in HUD
  document.getElementById("fix-dot").style.background = "var(--green)";
  document.getElementById("fix-label").textContent = "GPS Fix ✓";
  document.getElementById("fw-label").textContent = "fw sim";
  setBadge(true, "Simulating");

  document.getElementById("sim-btn").textContent = "■ Stop Simulation";
  document.getElementById("sim-btn").classList.add("running");

  simTimer = setInterval(() => {
    const [lat, lon] = grid[simRow][simTree];
    const dist = (Math.random() * 0.12).toFixed(3) * 1;
    addHit({ row: simRow, tree: simTree, dist, lat, lon });
    map.panTo([lat, lon], { animate: true, duration: 0.4 });

    simTree++;
    if (simTree >= CFG.numTrees) {
      simTree = 0; simRow++;
    }
    if (simRow >= CFG.numRows) {
      clearInterval(simTimer); simTimer = null;
      document.getElementById("sim-btn").textContent = "▶ Simulate Run";
      document.getElementById("sim-btn").classList.remove("running");
      setBadge(false, "Sim Done");
    }
  }, 400);
}
</script>
</body>
</html>
